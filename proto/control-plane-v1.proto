service NotifyService {
  rpc Health(HealthRequest) returns (HealthReply);
  rpc ListWebhookEndpoints(ListNotifyWebhookEndpointsRequest) returns (ListNotifyWebhookEndpointsReply);
  rpc CreateWebhookEndpoint(CreateNotifyWebhookEndpointRequest) returns (NotifyWebhookEndpointReply);
  rpc RotateWebhookSecret(RotateNotifyWebhookSecretRequest) returns (NotifyWebhookEndpointReply);
  rpc ListTemplates(ListNotificationTemplatesRequest) returns (ListNotificationTemplatesReply);
  rpc CreateTemplate(CreateNotificationTemplateRequest) returns (NotificationTemplateReply);
  rpc ListPreferences(ListNotificationPreferencesRequest) returns (ListNotificationPreferencesReply);
  rpc UpsertPreference(UpsertNotificationPreferenceRequest) returns (NotificationPreferenceReply);
  rpc ListAlertRoutes(ListNotifyAlertRoutesRequest) returns (ListNotifyAlertRoutesReply);
  rpc CreateAlertRoute(CreateNotifyAlertRouteRequest) returns (NotifyAlertRouteReply);
  rpc TriggerAlert(TriggerNotifyAlertRequest) returns (TriggerNotifyAlertReply);
  rpc GetNotifySummary(GetNotifySummaryRequest) returns (NotifySummaryReply);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsReply);
  rpc CreateNotification(CreateNotificationRequest) returns (NotificationReply);
  rpc GetNotificationHistory(GetNotificationHistoryRequest) returns (NotificationHistoryReply);
  rpc DeliverNotification(DeliverNotificationRequest) returns (NotificationReply);
  rpc AcknowledgeNotification(AcknowledgeNotificationRequest) returns (NotificationReply);
  rpc SnoozeNotification(SnoozeNotificationRequest) returns (NotificationReply);
  rpc EscalateNotification(EscalateNotificationRequest) returns (NotificationReply);
  rpc RetryNotification(RetryNotificationRequest) returns (NotificationReply);
  rpc DispatchNotifications(DispatchNotificationsRequest) returns (DispatchNotificationsReply);
  rpc ListDeadLetters(ListNotificationDeadLettersRequest) returns (ListNotificationDeadLettersReply);
  rpc ReplayDeadLetter(ReplayNotificationDeadLetterRequest) returns (NotificationReply);
  rpc ListOutbox(ListNotifyOutboxRequest) returns (ListNotifyOutboxReply);
}

