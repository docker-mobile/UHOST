syntax = "proto3";

package projectuhost.controlplane.v1;

message HealthRequest {}

message HealthReply {
  string status = 1;
}

message ResourceMetadata {
  string created_at = 1;
  string updated_at = 2;
  string lifecycle = 3;
  string ownership_scope = 4;
  optional string owner_id = 5;
  map<string, string> labels = 6;
  map<string, string> annotations = 7;
  optional string deleted_at = 8;
  string etag = 9;
}

// Phase-1 runtime kernel vocabulary for explicit route admission classification.
enum RouteSurface {
  ROUTE_SURFACE_UNSPECIFIED = 0;
  ROUTE_SURFACE_PUBLIC = 1;
  ROUTE_SURFACE_TENANT = 2;
  ROUTE_SURFACE_OPERATOR = 3;
  ROUTE_SURFACE_INTERNAL = 4;
}

enum RouteMethodMatch {
  ROUTE_METHOD_MATCH_UNSPECIFIED = 0;
  ROUTE_METHOD_MATCH_ANY = 1;
  ROUTE_METHOD_MATCH_SAFE = 2;
  ROUTE_METHOD_MATCH_UNSAFE = 3;
}

enum RouteRequestClass {
  ROUTE_REQUEST_CLASS_UNSPECIFIED = 0;
  ROUTE_REQUEST_CLASS_READ = 1;
  ROUTE_REQUEST_CLASS_CONTROL_READ = 2;
  ROUTE_REQUEST_CLASS_MUTATE = 3;
  ROUTE_REQUEST_CLASS_ASYNC_MUTATE = 4;
  ROUTE_REQUEST_CLASS_OPERATOR_READ = 5;
  ROUTE_REQUEST_CLASS_OPERATOR_MUTATE = 6;
  ROUTE_REQUEST_CLASS_OPERATOR_DESTRUCTIVE = 7;
}

message RouteSurfaceBinding {
  string owner = 1;
  string claim = 2;
  string match_kind = 3;
  RouteSurface surface = 4;
  RouteMethodMatch method_match = 5;
  RouteRequestClass request_class = 6;
}

message RuntimeRouteSurfaceManifest {
  repeated RouteSurfaceBinding bindings = 1;
}

enum RuntimeProcessRole {
  RUNTIME_PROCESS_ROLE_UNSPECIFIED = 0;
  RUNTIME_PROCESS_ROLE_ALL_IN_ONE = 1;
  RUNTIME_PROCESS_ROLE_EDGE = 2;
  RUNTIME_PROCESS_ROLE_CONTROLLER = 3;
  RUNTIME_PROCESS_ROLE_WORKER = 4;
  RUNTIME_PROCESS_ROLE_NODE_ADJACENT = 5;
}

enum RuntimeLogicalServiceGroup {
  RUNTIME_LOGICAL_SERVICE_GROUP_UNSPECIFIED = 0;
  RUNTIME_LOGICAL_SERVICE_GROUP_EDGE = 1;
  RUNTIME_LOGICAL_SERVICE_GROUP_IDENTITY_AND_POLICY = 2;
  RUNTIME_LOGICAL_SERVICE_GROUP_CONTROL = 3;
  RUNTIME_LOGICAL_SERVICE_GROUP_DATA_AND_MESSAGING = 4;
  RUNTIME_LOGICAL_SERVICE_GROUP_GOVERNANCE_AND_OPERATIONS = 5;
  RUNTIME_LOGICAL_SERVICE_GROUP_UVM = 6;
}

enum RuntimeReadiness {
  RUNTIME_READINESS_UNSPECIFIED = 0;
  RUNTIME_READINESS_STARTING = 1;
  RUNTIME_READINESS_READY = 2;
}

enum RuntimeDrainIntent {
  RUNTIME_DRAIN_INTENT_UNSPECIFIED = 0;
  RUNTIME_DRAIN_INTENT_SERVING = 1;
  RUNTIME_DRAIN_INTENT_DRAINING = 2;
}

enum RuntimeLeaseFreshness {
  RUNTIME_LEASE_FRESHNESS_UNSPECIFIED = 0;
  RUNTIME_LEASE_FRESHNESS_FRESH = 1;
  RUNTIME_LEASE_FRESHNESS_STALE = 2;
  RUNTIME_LEASE_FRESHNESS_EXPIRED = 3;
}

enum RuntimeParticipantLeaseSource {
  RUNTIME_PARTICIPANT_LEASE_SOURCE_UNSPECIFIED = 0;
  RUNTIME_PARTICIPANT_LEASE_SOURCE_LINKED_REGISTRATION = 1;
  RUNTIME_PARTICIPANT_LEASE_SOURCE_PUBLISHED_STATE_FALLBACK = 2;
}

enum RuntimeParticipantDegradedReason {
  RUNTIME_PARTICIPANT_DEGRADED_REASON_UNSPECIFIED = 0;
  RUNTIME_PARTICIPANT_DEGRADED_REASON_LEASE_STALE = 1;
  RUNTIME_PARTICIPANT_DEGRADED_REASON_LEASE_EXPIRED = 2;
}

message RuntimeServiceGroupOwnership {
  RuntimeLogicalServiceGroup group = 1;
  RuntimeProcessRole owner_role = 2;
  repeated string services = 3;
}

message RuntimeLeaseState {
  string renewed_at = 1;
  string expires_at = 2;
  uint32 duration_seconds = 3;
  RuntimeLeaseFreshness freshness = 4;
}

message RuntimeProcessState {
  string registration_id = 1;
  RuntimeReadiness readiness = 2;
  RuntimeDrainIntent drain_intent = 3;
  string registered_at = 4;
  RuntimeLeaseState lease = 5;
}

message RuntimeParticipantState {
  RuntimeReadiness readiness = 1;
  RuntimeDrainIntent drain_intent = 2;
  RuntimeLeaseState lease = 3;
  RuntimeDrainIntent published_drain_intent = 4;
  RuntimeParticipantLeaseSource lease_source = 5;
  RuntimeParticipantDegradedReason degraded_reason = 6;
  RuntimeParticipantDrainPhase drain_phase = 7;
  string takeover_registration_id = 8;
  string takeover_acknowledged_at = 9;
}

enum RuntimeParticipantDrainPhase {
  RUNTIME_PARTICIPANT_DRAIN_PHASE_UNSPECIFIED = 0;
  RUNTIME_PARTICIPANT_DRAIN_PHASE_SERVING = 1;
  RUNTIME_PARTICIPANT_DRAIN_PHASE_TAKEOVER_PENDING = 2;
  RUNTIME_PARTICIPANT_DRAIN_PHASE_TAKEOVER_ACKNOWLEDGED = 3;
}

enum RuntimeParticipantCleanupStage {
  RUNTIME_PARTICIPANT_CLEANUP_STAGE_UNSPECIFIED = 0;
  RUNTIME_PARTICIPANT_CLEANUP_STAGE_PENDING_REVIEW = 1;
  RUNTIME_PARTICIPANT_CLEANUP_STAGE_PREFLIGHT_CONFIRMED = 2;
  RUNTIME_PARTICIPANT_CLEANUP_STAGE_TOMBSTONE_ELIGIBLE = 3;
}

message RuntimeEvacuationRouteWithdrawalArtifact {
  string artifact_id = 1;
  string source_participant_registration_id = 2;
  repeated string service_groups = 3;
  string prepared_at = 4;
}

message RuntimeEvacuationTargetReadinessArtifact {
  string artifact_id = 1;
  string source_participant_registration_id = 2;
  string target_participant_registration_id = 3;
  repeated string service_groups = 4;
  string prepared_at = 5;
}

message RuntimeEvacuationRollbackArtifact {
  string artifact_id = 1;
  string source_participant_registration_id = 2;
  string target_participant_registration_id = 3;
  repeated string service_groups = 4;
  string prepared_at = 5;
}

message RuntimeParticipantCleanupWorkflow {
  string id = 1;
  string workflow_kind = 2;
  string phase = 3;
  RuntimeParticipantCleanupStage stage = 4;
  uint32 review_observations = 5;
  string last_observed_stale_at = 6;
  string preflight_confirmed_at = 7;
  string tombstone_eligible_at = 8;
  string created_at = 9;
  string updated_at = 10;
  RuntimeEvacuationRouteWithdrawalArtifact route_withdrawal = 11;
  RuntimeEvacuationTargetReadinessArtifact target_readiness = 12;
  RuntimeEvacuationRollbackArtifact rollback = 13;
}

message RuntimeParticipantReconciliation {
  string last_reconciled_at = 1;
  string stale_since = 2;
  RuntimeParticipantCleanupWorkflow cleanup_workflow = 3;
}

enum RuntimeServiceGroupConflictState {
  RUNTIME_SERVICE_GROUP_CONFLICT_STATE_UNSPECIFIED = 0;
  RUNTIME_SERVICE_GROUP_CONFLICT_STATE_NO_CONFLICT = 1;
  RUNTIME_SERVICE_GROUP_CONFLICT_STATE_MULTIPLE_HEALTHY_REGISTRATIONS = 2;
}

message RuntimeServiceGroupRegistrationResolution {
  string registration_id = 1;
  string participant_kind = 2;
  string subject_id = 3;
  string role = 4;
  string node_name = 5;
  string lease_registration_id = 6;
  string registered_at = 7;
  RuntimeReadinessState readiness = 8;
  RuntimeDrainIntent drain_intent = 9;
  RuntimeLeaseFreshness lease_freshness = 10;
  bool healthy = 11;
  RuntimeParticipantDrainPhase drain_phase = 12;
  string takeover_registration_id = 13;
  string takeover_acknowledged_at = 14;
}

message RuntimeServiceGroupDirectoryEntry {
  RuntimeLogicalServiceGroup group = 1;
  repeated string resolved_registration_ids = 2;
  RuntimeServiceGroupConflictState conflict_state = 3;
  repeated RuntimeServiceGroupRegistrationResolution registrations = 4;
}

message RuntimeRegionMembership {
  string region_id = 1;
  string region_name = 2;
}

message RuntimeCellMembership {
  string cell_id = 1;
  string cell_name = 2;
}

message RuntimeParticipantRegistration {
  string registration_id = 1;
  string participant_kind = 2;
  string subject_id = 3;
  string role = 4;
  string node_name = 5;
  repeated string service_groups = 6;
  string registered_at = 7;
  string lease_registration_id = 8;
  RuntimeParticipantState state = 9;
  RuntimeParticipantReconciliation reconciliation = 10;
}

message RuntimeParticipantTombstoneHistoryEntry {
  string event_id = 1;
  string cell_id = 2;
  string cell_name = 3;
  string region_id = 4;
  string region_name = 5;
  string participant_registration_id = 6;
  string participant_kind = 7;
  string participant_subject_id = 8;
  string participant_role = 9;
  string node_name = 10;
  repeated string service_groups = 11;
  string cleanup_workflow_id = 12;
  uint32 review_observations = 13;
  string stale_since = 14;
  string preflight_confirmed_at = 15;
  string tombstone_eligible_at = 16;
  string tombstoned_at = 17;
  string actor_subject = 18;
  string actor_type = 19;
  string correlation_id = 20;
  string lease_registration_id = 21;
  bool removed_from_cell_directory = 22;
  bool lease_registration_soft_deleted = 23;
  bool cleanup_workflow_soft_deleted = 24;
  RuntimeDrainIntent published_drain_intent = 25;
  RuntimeParticipantDegradedReason degraded_reason = 26;
  RuntimeParticipantLeaseSource lease_source = 27;
}

message RuntimeTopologyReply {
  RuntimeProcessRole process_role = 1;
  string deployment_mode = 2;
  string node_name = 3;
  repeated RuntimeServiceGroupOwnership service_groups = 4;
  RuntimeProcessState process_state = 5;
  RuntimeRegionMembership region = 6;
  RuntimeCellMembership cell = 7;
  repeated RuntimeParticipantRegistration participants = 8;
  repeated RuntimeParticipantTombstoneHistoryEntry tombstone_history = 9;
  repeated RuntimeServiceGroupDirectoryEntry service_group_directory = 10;
}

message ListRuntimeParticipantTombstoneHistoryRequest {
  uint32 limit = 1;
  string cursor = 2;
}

message RuntimeParticipantTombstoneHistoryRetention {
  uint32 max_entries = 1;
  uint32 retained_entries = 2;
  uint32 pruned_entries = 3;
  string oldest_retained_tombstoned_at = 4;
  string oldest_retained_event_id = 5;
}

message ListRuntimeParticipantTombstoneHistoryReply {
  repeated RuntimeParticipantTombstoneHistoryEntry items = 1;
  string next_cursor = 2;
  RuntimeParticipantTombstoneHistoryRetention retention = 3;
}

message RuntimeParticipantTombstoneRelayEvidence {
  string message_id = 1;
  string topic = 2;
  string idempotency_key = 3;
  string source_service = 4;
  string event_type = 5;
  string delivery_state = 6;
  string backend = 7;
  uint32 attempts = 8;
  string last_attempt_at = 9;
  string delivered_at = 10;
  string last_error = 11;
  string next_retry_at = 12;
  uint32 replay_count = 13;
  string last_replayed_at = 14;
  string last_replay_reason = 15;
}

message RuntimeParticipantTombstoneAggregateEntry {
  RuntimeParticipantTombstoneHistoryEntry history = 1;
  RuntimeParticipantTombstoneRelayEvidence relay_evidence = 2;
}

message ListRuntimeParticipantTombstoneAggregateHistoryRequest {
  uint32 limit = 1;
  string cursor = 2;
  string event_id = 3;
  string cell_id = 4;
  string region_id = 5;
  string participant_registration_id = 6;
  string cleanup_workflow_id = 7;
}

message ListRuntimeParticipantTombstoneAggregateHistoryReply {
  repeated RuntimeParticipantTombstoneAggregateEntry items = 1;
  string next_cursor = 2;
  RuntimeParticipantTombstoneHistoryRetention retention = 3;
}

message TombstoneRuntimeParticipantRequest {
  string registration_id = 1;
}

message TombstoneRuntimeParticipantReply {
  string cell_id = 1;
  string participant_registration_id = 2;
  string cleanup_workflow_id = 3;
  string tombstoned_at = 4;
  string lease_registration_id = 5;
  bool removed_from_cell_directory = 6;
  bool lease_registration_soft_deleted = 7;
  bool cleanup_workflow_soft_deleted = 8;
}

service RuntimeService {
  rpc GetTopology(HealthRequest) returns (RuntimeTopologyReply);
  rpc ListParticipantTombstoneHistory(ListRuntimeParticipantTombstoneHistoryRequest) returns (ListRuntimeParticipantTombstoneHistoryReply);
  rpc ListParticipantTombstoneAggregateHistory(ListRuntimeParticipantTombstoneAggregateHistoryRequest) returns (ListRuntimeParticipantTombstoneAggregateHistoryReply);
  rpc TombstoneParticipant(TombstoneRuntimeParticipantRequest) returns (TombstoneRuntimeParticipantReply);
}

enum PrincipalKind {
  PRINCIPAL_KIND_UNSPECIFIED = 0;
  PRINCIPAL_KIND_SYSTEM = 1;
  PRINCIPAL_KIND_OPERATOR = 2;
  PRINCIPAL_KIND_USER = 3;
  PRINCIPAL_KIND_WORKLOAD = 4;
}

message PrincipalIdentity {
  PrincipalKind kind = 1;
  string subject = 2;
  string credential_id = 3;
}

message CreateUserRequest {
  string email = 1;
  string display_name = 2;
  string password = 3;
}

message CreateUserReply {
  string id = 1;
  string email = 2;
  string display_name = 3;
  bool mfa_enabled = 4;
  bool suspended = 5;
  ResourceMetadata metadata = 6;
}

message ListIdentityUsersRequest {}

message ListIdentityUsersReply {
  repeated CreateUserReply users = 1;
}

message GetIdentityUserRequest {
  string user_id = 1;
}

message SetIdentityUserLifecycleRequest {
  string user_id = 1;
}

message BulkCreateUsersRequest {
  repeated CreateUserRequest users = 1;
  bool fail_fast = 2;
}

message BulkUserErrorReply {
  string email = 1;
  string code = 2;
  string message = 3;
}

message BulkCreateUsersReply {
  uint32 attempted = 1;
  uint32 created_count = 2;
  uint32 failed_count = 3;
  repeated CreateUserReply created = 4;
  repeated BulkUserErrorReply failed = 5;
}

message CreateSessionRequest {
  string email = 1;
  string password = 2;
}

message SessionReply {
  string id = 1;
  string user_id = 2;
  string issued_at = 3;
  string expires_at = 4;
  ResourceMetadata metadata = 5;
}

message CreateApiKeyRequest {
  string user_id = 1;
  string name = 2;
}

message ApiKeyReply {
  string id = 1;
  string user_id = 2;
  string name = 3;
  uint32 version = 4;
  string secret_preview = 5;
  string issued_at = 6;
  bool active = 7;
  ResourceMetadata metadata = 8;
}

message CreateApiKeyReply {
  string id = 1;
  string name = 2;
  string secret = 3;
  string secret_preview = 4;
  string user_id = 5;
  uint32 version = 6;
  string issued_at = 7;
  bool active = 8;
  ResourceMetadata metadata = 9;
}

message ManageApiKeyRequest {
  string api_key_id = 1;
}

message GetIdentitySummaryRequest {}

message GetIdentityCredentialLifecycleRequest {}

enum IdentityCredentialLifecycleKind {
  IDENTITY_CREDENTIAL_LIFECYCLE_KIND_UNSPECIFIED = 0;
  IDENTITY_CREDENTIAL_LIFECYCLE_KIND_SESSION = 1;
  IDENTITY_CREDENTIAL_LIFECYCLE_KIND_API_KEY = 2;
  IDENTITY_CREDENTIAL_LIFECYCLE_KIND_WORKLOAD_TOKEN = 3;
  IDENTITY_CREDENTIAL_LIFECYCLE_KIND_SECRET_VERSION = 4;
}

enum IdentityCredentialLifecycleState {
  IDENTITY_CREDENTIAL_LIFECYCLE_STATE_UNSPECIFIED = 0;
  IDENTITY_CREDENTIAL_LIFECYCLE_STATE_ACTIVE = 1;
  IDENTITY_CREDENTIAL_LIFECYCLE_STATE_EXPIRING = 2;
  IDENTITY_CREDENTIAL_LIFECYCLE_STATE_EXPIRED = 3;
  IDENTITY_CREDENTIAL_LIFECYCLE_STATE_INACTIVE = 4;
  IDENTITY_CREDENTIAL_LIFECYCLE_STATE_REVOKED = 5;
  IDENTITY_CREDENTIAL_LIFECYCLE_STATE_SUSPENDED_OWNER = 6;
}

enum IdentityCredentialSecretSourceKind {
  IDENTITY_CREDENTIAL_SECRET_SOURCE_KIND_UNSPECIFIED = 0;
  IDENTITY_CREDENTIAL_SECRET_SOURCE_KIND_API_KEY = 1;
  IDENTITY_CREDENTIAL_SECRET_SOURCE_KIND_WORKLOAD_TOKEN = 2;
}

message IdentityUserSummaryReply {
  uint32 total = 1;
  uint32 active = 2;
  uint32 suspended = 3;
}

message IdentitySessionSummaryReply {
  uint32 total = 1;
  uint32 active = 2;
  uint32 expired = 3;
}

message IdentityApiKeySummaryReply {
  uint32 total = 1;
  uint32 active = 2;
  uint32 inactive = 3;
}

message IdentityProjectWorkloadIdentitySummaryReply {
  string project_id = 1;
  uint32 total = 2;
  uint32 active = 3;
  uint32 inactive = 4;
}

message IdentityWorkloadIdentitySummaryReply {
  uint32 total = 1;
  uint32 active = 2;
  uint32 inactive = 3;
  uint32 unscoped = 4;
  repeated IdentityProjectWorkloadIdentitySummaryReply by_project = 5;
}

message IdentityCredentialLifecycleKindSummaryReply {
  IdentityCredentialLifecycleKind kind = 1;
  uint32 total = 2;
}

message IdentityCredentialLifecycleStateSummaryReply {
  IdentityCredentialLifecycleState state = 1;
  uint32 total = 2;
}

message IdentityCredentialLifecycleSummaryReply {
  uint32 total = 1;
  repeated IdentityCredentialLifecycleKindSummaryReply by_kind = 2;
  repeated IdentityCredentialLifecycleStateSummaryReply by_state = 3;
}

message IdentityCredentialLifecycleEntryReply {
  IdentityCredentialLifecycleKind kind = 1;
  string id = 2;
  IdentityCredentialLifecycleState state = 3;
  string ownership_scope = 4;
  optional string owner_id = 5;
  string issued_at = 6;
  optional string expires_at = 7;
  optional string principal_subject = 8;
  optional IdentityCredentialSecretSourceKind source_kind = 9;
  optional string source_id = 10;
  optional uint32 version = 11;
  optional string secret_preview = 12;
}

message IdentityCredentialLifecycleReportReply {
  string generated_at = 1;
  IdentityCredentialLifecycleSummaryReply summary = 2;
  repeated IdentityCredentialLifecycleEntryReply entries = 3;
}

message IdentitySummaryReply {
  IdentityUserSummaryReply users = 1;
  IdentitySessionSummaryReply sessions = 2;
  IdentityApiKeySummaryReply api_keys = 3;
  IdentityWorkloadIdentitySummaryReply workload_identities = 4;
  IdentityCredentialLifecycleSummaryReply credential_lifecycle = 5;
}

message CreateWorkloadIdentityRequest {
  string subject = 1;
  string display_name = 2;
  string project_id = 3;
  string workload_id = 4;
  repeated string audiences = 5;
  uint64 ttl_seconds = 6;
}

message WorkloadCredentialReply {
  uint32 version = 1;
  string secret_preview = 2;
  string issued_at = 3;
  string expires_at = 4;
}

message WorkloadIdentityReply {
  string id = 1;
  PrincipalIdentity principal = 2;
  string display_name = 3;
  optional string project_id = 4;
  optional string workload_id = 5;
  repeated string audiences = 6;
  bool active = 7;
  uint32 credential_version = 8;
  string expires_at = 9;
  WorkloadCredentialReply credential = 10;
  ResourceMetadata metadata = 11;
}

message IssueWorkloadIdentityReply {
  WorkloadIdentityReply identity = 1;
  string token = 2;
  reserved 3;
}

message ListWorkloadIdentitiesRequest {}

message ListWorkloadIdentitiesReply {
  repeated WorkloadIdentityReply identities = 1;
}

message ManageWorkloadIdentityRequest {
  string workload_identity_id = 1;
}

service IdentityService {
  rpc Health(HealthRequest) returns (HealthReply);
  rpc ListUsers(ListIdentityUsersRequest) returns (ListIdentityUsersReply);
  rpc CreateUser(CreateUserRequest) returns (CreateUserReply);
  rpc GetUser(GetIdentityUserRequest) returns (CreateUserReply);
  rpc SuspendUser(SetIdentityUserLifecycleRequest) returns (CreateUserReply);
  rpc ReactivateUser(SetIdentityUserLifecycleRequest) returns (CreateUserReply);
  rpc BulkCreateUsers(BulkCreateUsersRequest) returns (BulkCreateUsersReply);
  rpc CreateSession(CreateSessionRequest) returns (SessionReply);
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyReply);
  rpc RotateApiKey(ManageApiKeyRequest) returns (CreateApiKeyReply);
  rpc RevokeApiKey(ManageApiKeyRequest) returns (ApiKeyReply);
  rpc GetIdentitySummary(GetIdentitySummaryRequest) returns (IdentitySummaryReply);
  rpc GetIdentityCredentialLifecycle(GetIdentityCredentialLifecycleRequest) returns (IdentityCredentialLifecycleReportReply);
  rpc IssueWorkloadIdentity(CreateWorkloadIdentityRequest) returns (IssueWorkloadIdentityReply);
  rpc RotateWorkloadIdentity(ManageWorkloadIdentityRequest) returns (IssueWorkloadIdentityReply);
  rpc RevokeWorkloadIdentity(ManageWorkloadIdentityRequest) returns (WorkloadIdentityReply);
  rpc ListWorkloadIdentities(ListWorkloadIdentitiesRequest) returns (ListWorkloadIdentitiesReply);
}

message CreateOrganizationRequest {
  string name = 1;
  string slug = 2;
}

message CreateOrganizationReply {
  string id = 1;
  string slug = 2;
}

service TenancyService {
  rpc Health(HealthRequest) returns (HealthReply);
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationReply);
}

message CreateWorkloadRequest {
  string project_id = 1;
  string name = 2;
  string kind = 3;
  optional string image = 4;
  repeated string command = 5;
  uint32 replicas = 6;
  string priority = 7;
}

message WorkloadReply {
  string id = 1;
  string project_id = 2;
  string name = 3;
  string kind = 4;
  optional string image = 5;
  repeated string command = 6;
  uint32 replicas = 7;
  string priority = 8;
  ResourceMetadata metadata = 9;
}

message ListWorkloadsReply {
  repeated WorkloadReply items = 1;
}

message CreateDeploymentRequest {
  string workload_id = 1;
  string release_channel = 2;
  string strategy = 3;
  string desired_revision = 4;
}

message DeploymentReply {
  string id = 1;
  string workload_id = 2;
  string release_channel = 3;
  string strategy = 4;
  string desired_revision = 5;
  string rollout_state = 6;
  ResourceMetadata metadata = 7;
}

message ListDeploymentsReply {
  repeated DeploymentReply items = 1;
}

enum ShardPlacementBindingScope {
  SHARD_PLACEMENT_BINDING_SCOPE_UNSPECIFIED = 0;
  SHARD_PLACEMENT_BINDING_SCOPE_DEPLOYMENT = 1;
  SHARD_PLACEMENT_BINDING_SCOPE_REPLICA = 2;
}

message ShardPlacementSpreadPolicy {
  uint32 min_distinct_cells = 1;
  uint32 min_distinct_nodes = 2;
}

enum ShardPlacementFailoverMode {
  SHARD_PLACEMENT_FAILOVER_MODE_UNSPECIFIED = 0;
  SHARD_PLACEMENT_FAILOVER_MODE_DISABLED = 1;
  SHARD_PLACEMENT_FAILOVER_MODE_COLD_STANDBY = 2;
  SHARD_PLACEMENT_FAILOVER_MODE_WARM_STANDBY = 3;
  SHARD_PLACEMENT_FAILOVER_MODE_ACTIVE_PASSIVE = 4;
}

message ShardPlacementFailoverRule {
  ShardPlacementFailoverMode mode = 1;
  optional string failover_group = 2;
  uint32 priority = 3;
}

message CreateShardPlacementRequest {
  string deployment_id = 1;
  ShardPlacementBindingScope binding_scope = 2;
  optional uint32 replica_ordinal = 3;
  string cell_id = 4;
  optional string node_id = 5;
  ShardPlacementSpreadPolicy spread = 6;
  ShardPlacementFailoverRule failover = 7;
}

message ShardPlacementReply {
  string id = 1;
  string deployment_id = 2;
  ShardPlacementBindingScope binding_scope = 3;
  optional uint32 replica_ordinal = 4;
  string cell_id = 5;
  optional string node_id = 6;
  ShardPlacementSpreadPolicy spread = 7;
  ShardPlacementFailoverRule failover = 8;
  ResourceMetadata metadata = 9;
}

message ListShardPlacementsReply {
  repeated ShardPlacementReply items = 1;
}

service ControlService {
  rpc Health(HealthRequest) returns (HealthReply);
  rpc ListWorkloads(HealthRequest) returns (ListWorkloadsReply);
  rpc CreateWorkload(CreateWorkloadRequest) returns (WorkloadReply);
  rpc ListDeployments(HealthRequest) returns (ListDeploymentsReply);
  rpc CreateDeployment(CreateDeploymentRequest) returns (DeploymentReply);
  rpc ListShardPlacements(HealthRequest) returns (ListShardPlacementsReply);
  rpc CreateShardPlacement(CreateShardPlacementRequest) returns (ShardPlacementReply);
}

enum ContainerExecutionClass {
  CONTAINER_EXECUTION_CLASS_UNSPECIFIED = 0;
  CONTAINER_EXECUTION_CLASS_SERVICE = 1;
  CONTAINER_EXECUTION_CLASS_JOB = 2;
}

enum ContainerWorkloadReconciliationState {
  CONTAINER_WORKLOAD_RECONCILIATION_STATE_UNSPECIFIED = 0;
  CONTAINER_WORKLOAD_RECONCILIATION_STATE_PLANNED = 1;
  CONTAINER_WORKLOAD_RECONCILIATION_STATE_BLOCKED = 2;
}

message GetContainerServiceSummaryRequest {}

message CreateContainerNodePoolRequest {
  string project_id = 1;
  string name = 2;
  string region = 3;
  string scheduler_pool = 4;
  uint32 min_nodes = 5;
  uint32 desired_nodes = 6;
  uint32 max_nodes = 7;
}

message ContainerNodePoolReply {
  string id = 1;
  string project_id = 2;
  string name = 3;
  string region = 4;
  string scheduler_pool = 5;
  uint32 min_nodes = 6;
  uint32 desired_nodes = 7;
  uint32 max_nodes = 8;
  ResourceMetadata metadata = 9;
}

message ListContainerNodePoolsRequest {}

message ListContainerNodePoolsReply {
  repeated ContainerNodePoolReply items = 1;
}

message GetContainerNodePoolRequest {
  string node_pool_id = 1;
}

message DeleteContainerNodePoolRequest {
  string node_pool_id = 1;
