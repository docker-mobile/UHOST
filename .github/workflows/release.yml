name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve pinned Rust toolchain
        id: rust-toolchain
        shell: bash
        run: |
          channel="$(grep -E '^[[:space:]]*channel[[:space:]]*=' rust-toolchain.toml | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [[ -z "${channel}" ]]; then
            echo "failed to resolve the pinned Rust toolchain from rust-toolchain.toml" >&2
            exit 1
          fi
          echo "channel=${channel}" >> "${GITHUB_OUTPUT}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --locked --release -p uhostd -p uhostctl -p uhost-uvm-runner

      - name: Generate release-state snapshot
        run: bash scripts/generate-release-state.sh

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/uhostd dist/
          cp target/release/uhostctl dist/
          cp target/release/uhost-uvm-runner dist/
          tar -C dist -czf "uhost-${GITHUB_REF_NAME:-manual}-linux-amd64.tar.gz" .

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            uhost-*.tar.gz
            docs/generated/release-state.json
            docs/generated/release-state.md

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            uhost-*.tar.gz
            docs/generated/release-state.json
            docs/generated/release-state.md
          generate_release_notes: true
