                            format: date-time
                          verifier:
                            type: string
                          observed_sha256:
                            type: string
                      artifacts:
                        type: array
                        items:
                          type: object
                          required: [kind, object_location, sha256, size_bytes, verification]
                          properties:
                            kind:
                              type: string
                              enum: [snapshot_bundle]
                            object_location:
                              type: string
                            sha256:
                              type: string
                            size_bytes:
                              type: integer
                              minimum: 0
                            key_ref:
                              type: string
                            verification:
                              type: object
                              required: [state, verified_at, verifier, observed_sha256]
                              properties:
                                state:
                                  type: string
                                  enum: [verified]
                                verified_at:
                                  type: string
                                  format: date-time
                                verifier:
                                  type: string
                                observed_sha256:
                                  type: string
                  storage_recovery_point:
                    type: object
                    required: [volume_id, version, execution_count, etag, captured_at]
                    properties:
                      volume_id:
                        type: string
                      version:
                        type: integer
                        minimum: 0
                      execution_count:
                        type: integer
                        minimum: 0
                      etag:
                        type: string
                      captured_at:
                        type: string
                        format: date-time
                  storage_recovery_point_selection_reason:
                    type: string
                    description: Stable operator-readable explanation for why the embedded storage recovery point is authoritative for this backup.
                  storage_recovery_point_state_reason:
                    type: string
                    description: Stable operator-readable explanation for whether the embedded storage recovery point still matches the current ready storage recovery point or has become historical/unavailable.
