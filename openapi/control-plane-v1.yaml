paths:
  /healthz:
    x-uhost-surface: public
    get:
      summary: Runtime health check
      responses:
        "200":
          description: Runtime health status
  /readyz:
    x-uhost-surface: public
    get:
      summary: Runtime readiness gate
      responses:
        "200":
          description: Runtime is ready to serve
        "503":
          description: Runtime is not ready to serve
  /metrics:
    x-uhost-surface: operator
    get:
      summary: Runtime metrics snapshot
      responses:
        "200":
          description: Runtime metrics snapshot
  /runtime/topology:
    x-uhost-surface: operator
    get:
      summary: Runtime process role, cell membership, logical ownership, durable readiness or drain lease state, stale-peer cleanup workflow status, and recent tombstone history
      responses:
        "200":
          description: Runtime topology snapshot
          content:
            application/json:
              schema:
                type: object
                required: [process_role, deployment_mode, region, cell, service_groups, service_group_directory, participants, tombstone_history]
                properties:
                  process_role:
                    type: string
                    enum: [all_in_one, edge, controller, worker, node_adjacent]
                  deployment_mode:
                    type: string
                  node_name:
                    type: string
                  region:
                    type: object
                    required: [region_id, region_name]
                    properties:
                      region_id:
                        type: string
                      region_name:
                        type: string
                  cell:
                    type: object
                    required: [cell_id, cell_name]
                    properties:
                      cell_id:
                        type: string
                      cell_name:
                        type: string
                  process_state:
                    type: object
                    required: [registration_id, readiness, drain_intent, registered_at, lease]
                    properties:
                      registration_id:
                        type: string
                      readiness:
                        type: string
                        enum: [starting, ready]
                      drain_intent:
                        type: string
                        enum: [serving, draining]
                      registered_at:
                        type: string
                        format: date-time
                      lease:
                        type: object
                        required: [renewed_at, expires_at, duration_seconds, freshness]
                        properties:
                          renewed_at:
                            type: string
                            format: date-time
                          expires_at:
                            type: string
                            format: date-time
                          duration_seconds:
                            type: integer
                            minimum: 1
                          freshness:
                            type: string
                            enum: [fresh, stale, expired]
                  service_groups:
                    type: array
                    items:
                      type: object
                      required: [group, owner_role, services]
                      properties:
                        group:
                          type: string
                          enum:
                            [edge, identity_and_policy, control, data_and_messaging, governance_and_operations, uvm]
                        owner_role:
                          type: string
                          enum: [all_in_one, edge, controller, worker, node_adjacent]
                        services:
                          type: array
                          items:
                            type: string
                  service_group_directory:
                    type: array
                    items:
                      type: object
                      required:
                        [group, resolved_registration_ids, conflict_state, registrations]
                      properties:
                        group:
                          type: string
                          enum:
                            [edge, identity_and_policy, control, data_and_messaging, governance_and_operations, uvm]
                        resolved_registration_ids:
                          type: array
                          items:
                            type: string
                        conflict_state:
                          type: string
                          enum: [no_conflict, multiple_healthy_registrations]
                        registrations:
                          type: array
                          items:
                            type: object
                            required:
                              [registration_id, participant_kind, subject_id, role, registered_at, healthy]
                            properties:
                              registration_id:
                                type: string
                              participant_kind:
                                type: string
                              subject_id:
                                type: string
                              role:
                                type: string
                              node_name:
                                type: string
                              lease_registration_id:
                                type: string
                              registered_at:
                                type: string
                                format: date-time
                              readiness:
                                type: string
                                enum: [starting, ready]
                              drain_intent:
                                type: string
                                enum: [serving, draining]
                              drain_phase:
