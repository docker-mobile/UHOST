      responses:
        "200":
          description: Backup list
  /data/backups/{backup_id}/storage-lineage:
    get:
      summary: Inspect persisted database backup storage lineage
      description: Operator-only inspection view over one persisted backup lineage. This route remains under the `/data` route family for this phase and additionally requires an operator principal in the data service handler.
      parameters:
        - in: path
          name: backup_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup storage lineage inspection
          content:
            application/json:
              schema:
                type: object
                required: [backup_id, storage_volume_id, recovery_point, selection_reason, recovery_point_state_reason]
                properties:
                  backup_id:
                    type: string
                  storage_volume_id:
                    type: string
                  recovery_point:
                    type: object
                    required: [volume_id, version, execution_count, etag, captured_at]
                    properties:
                      volume_id:
                        type: string
                      version:
                        type: integer
                        minimum: 0
                      execution_count:
                        type: integer
                        minimum: 0
                      etag:
                        type: string
                      captured_at:
                        type: string
                        format: date-time
                  selection_reason:
                    type: string
                    description: Stable operator-readable explanation for why this backup bound to this persisted storage recovery point.
                  recovery_point_state_reason:
                    type: string
                    description: Stable operator-readable explanation for whether the persisted backup storage recovery point still matches the current ready storage recovery point or has become historical/unavailable.
  /data/restores:
    get:
      summary: List database restore jobs
      responses:
        "200":
          description: Restore list
  /data/restores/{restore_id}/storage-lineage:
    get:
      summary: Inspect persisted database restore storage lineage
      description: Operator-only inspection view over one persisted restore lineage. This route remains under the `/data` route family for this phase and additionally requires an operator principal in the data service handler.
      parameters:
        - in: path
          name: restore_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restore storage lineage inspection
          content:
            application/json:
              schema:
                type: object
                required: [restore_id, source_mode, storage_volume_id, restore_action_id, restore_workflow_id, selected_recovery_point, selection_reason, selected_recovery_point_state_reason]
                properties:
                  restore_id:
                    type: string
                  source_mode:
                    type: string
                    enum: [backup_correlated_storage_lineage, latest_ready_fallback]
                  storage_volume_id:
                    type: string
                  restore_action_id:
                    type: string
                  restore_workflow_id:
                    type: string
                  selected_recovery_point:
                    type: object
                    required: [volume_id, version, execution_count, etag, captured_at]
                    properties:
                      volume_id:
                        type: string
                      version:
                        type: integer
                        minimum: 0
                      execution_count:
                        type: integer
                        minimum: 0
                      etag:
                        type: string
                      captured_at:
                        type: string
                        format: date-time
                  backup_correlated_recovery_point:
                    nullable: true
                    type: object
                    required: [volume_id, version, execution_count, etag, captured_at]
                    properties:
                      volume_id:
                        type: string
                      version:
                        type: integer
                        minimum: 0
                      execution_count:
                        type: integer
                        minimum: 0
                      etag:
                        type: string
                      captured_at:
                        type: string
                        format: date-time
                  selection_reason:
                    type: string
                    description: Stable operator-readable explanation for why the selected storage recovery point was used.
                  selected_recovery_point_state_reason:
                    type: string
                    description: Stable operator-readable explanation for whether the persisted restore-selected storage recovery point still matches the current ready storage recovery point or has become historical/unavailable.
