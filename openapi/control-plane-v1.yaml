    post:
      summary: Publish records into one managed stream
      parameters:
        - in: path
          name: stream_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  type: array
                  items:
                    type: object
                    required: [payload]
                    properties:
                      partition:
                        type: integer
                        nullable: true
                      key:
                        type: string
                        nullable: true
                      payload:
                        type: string
                      headers:
                        type: object
                        additionalProperties:
                          type: string
                message_count:
                  type: integer
                  nullable: true
                byte_count:
                  type: integer
                  nullable: true
                producer_id:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Publish response
          content:
            application/json:
              schema: &stream_publish_reply
                type: object
                required: [stream, touched_partitions, appended_records]
                properties:
                  stream: *managed_stream
                  touched_partitions:
                    type: array
                    items: *stream_partition
                  appended_records:
                    type: array
                    items: &stream_log_record
                      type: object
                      required: [id, stream_id, partition_index, stream_offset, partition_offset, payload, headers, byte_count, published_at, metadata]
                      properties:
